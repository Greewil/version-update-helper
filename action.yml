name: Install VUH
description: Install VUH from tag using raw files

inputs:
  version:
    description: "VUH release tag (example: v2.13.0 or 2.13.0). If not specified, latest from main will be used."
    required: false

runs:
  using: composite
  steps:
    - name: Download VUH files from tag
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ -n "$VERSION" ]; then
          if [[ $VERSION != v* ]]; then 
            VERSION="v$VERSION"
          fi
          echo "Downloading VUH from tag: $VERSION"
          curl -f -L -o installer.sh \
            "https://raw.githubusercontent.com/Greewil/version-update-helper/${VERSION}/installer.sh"
          curl -f -L -o vuh.sh \
            "https://raw.githubusercontent.com/Greewil/version-update-helper/${VERSION}/vuh.sh"
        else
          echo "Downloading latest VUH from main branch"
          curl -f -L -o installer.sh \
            "https://raw.githubusercontent.com/Greewil/version-update-helper/main/installer.sh"
          curl -f -L -o vuh.sh \
            "https://raw.githubusercontent.com/Greewil/version-update-helper/main/vuh.sh"
        fi
        chmod +x installer.sh
        chmod +x vuh.sh

    - name: Install VUH
      shell: bash
      run: sudo ./installer.sh -d -n || true

    - name: Remove installer
      shell: bash
      run: |
        rm installer.sh
        rm vuh.sh

    - name: Verify VUH installation
      shell: bash
      run: |
        which vuh || { echo "vuh not found in PATH"; exit 1; }
        vuh -v
